        .btn { background: #111; color: white; padding: 1rem 1.5rem; border-radius: 12px; cursor: pointer; border: 1px solid #333; font-weight: 700; }

        const d = (s) => atob(s);
        const getThumb = (u) => `https://images.weserv.nl/?url=${encodeURIComponent(u)}&w=600&h=350&fit=cover&output=webp&q=40`;

        function watchdog() {
            // RELAXED FOR LOCAL FILE TESTING: Only hide if specifically hidden
            if (document.hidden || document.visibilityState === 'hidden') {
                document.body.classList.add('hide');
            } else {
                document.body.classList.remove('hide');
            }
            requestAnimationFrame(watchdog);
        }
        requestAnimationFrame(watchdog);

        function toggleFS() {
            const modal = document.getElementById('modal');
            if (modal.requestFullscreen) modal.requestFullscreen().then(() => {
                try { modal.requestPointerLock(); } catch(e) {}
            });
        }
        
        document.addEventListener('pointerlockchange', () => {
            if (!document.pointerLockElement && document.fullscreenElement) {
                // If lock is broken, something overlaid. 
                // Don't hide body here to prevent local file bugs, just exit FS
                document.exitFullscreen();
            }
        });

        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                if (e.isIntersecting) {
                    const img = e.target.querySelector('img');
                    if (img && !img.src) {
                        const raw = d(img.dataset.token);
                        fetch(getThumb(raw)).then(r => r.blob()).then(b => {
                            img.src = URL.createObjectURL(b);
                            img.onload = () => img.classList.add('show');
                        });
                    }
                }
            });
        }, { rootMargin: '800px' });

        function render() {
            for (let id in DB) {
                const sec = document.getElementById(id);
                if (!sec) continue;
                const grid = sec.querySelector('.grid');
                DB[id].forEach(i => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openM(i.u);
                    card.innerHTML = `<div class="shield"></div><img data-token="${i.u}">`;
                    grid.appendChild(card);
                    obs.observe(card);
                });
            }
        }

        function openM(token) {
            const raw = d(token);
            const m = document.getElementById('modal');
            const mi = document.getElementById('m-img');
            m.style.display = 'flex';
            fetch(raw).then(r => r.blob()).then(b => { mi.src = URL.createObjectURL(b); });
        }

        function closeM() {
            document.getElementById('modal').style.display = 'none';
            if (document.fullscreenElement) document.exitFullscreen();
        }

        document.onkeydown = (e) => {
            const forbidden = [123, 83, 85, 80, 67, 73, 74, 44];
            if (forbidden.includes(e.keyCode) || (e.ctrlKey || e.metaKey)) {
                if (e.keyCode !== 82 && e.keyCode !== 116) {
                    e.preventDefault();
                    return false;
                }
            }
        };

        window.onload = render;
    </script>
